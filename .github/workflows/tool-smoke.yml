name: Tool smoke (nightly)

# Live tool + LSP smoke harness (#209). Unlike CI (push/PR, deterministic), this
# installs and SPAWNS real tools/LSP servers and drives pi-lens's real dispatch
# path against per-language fixtures — so it's slow and network-dependent, hence
# nightly + manual only, never a per-PR gate.
#
# The harness exits nonzero only on genuine infra failures (timeout / exception /
# server_error). A tool that's merely unavailable (couldn't install on the
# runner) reports ⚠ and does NOT fail the run, so transient install/network
# flakiness doesn't produce false alarms — the printed report still shows the ⚠
# counts for review.

on:
  schedule:
    - cron: '0 6 * * *' # daily 06:00 UTC
  workflow_dispatch:

jobs:
  tool-smoke:
    name: Live tool + LSP smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Python provides pip for the pip-distributed tools (ruff, yamllint,
      # sqlfluff, mypy). GitHub-release tools (shellcheck/shfmt/hadolint/taplo/
      # tflint/terraform-ls/rust-analyzer) are fetched by the harness's own
      # --install; ubuntu-latest ships rustup/cargo so rust-analyzer can load.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build dist
        run: npm run build:dist

      - name: Tool layer (install + run each tool through real dispatch)
        run: node scripts/smoke-tools.mjs --install --verbose

      - name: LSP handshake layer (install + spawn + initialize each server)
        run: node scripts/smoke-tools.mjs --lsp --install --verbose
